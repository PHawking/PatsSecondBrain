<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Open Brain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f11;
      color: #e8e8ec;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 3rem;
    }

    .wrapper {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 0.25rem;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #c9b8ff;
      letter-spacing: -0.01em;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: #1a1a1f;
      border: 1px solid #2e2e38;
      border-radius: 10px;
      padding: 4px;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: #888899;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.55rem 0.5rem;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .tab-btn.active {
      background: #7c5cfc;
      color: #fff;
    }

    .tab-btn:hover:not(.active) { background: #2a2a3a; color: #c9b8ff; }

    /* ── Card ── */
    .card {
      background: #1a1a1f;
      border: 1px solid #2e2e38;
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    /* ── Tab panels ── */
    .panel { display: none; flex-direction: column; gap: 1.1rem; }
    .panel.active { display: flex; }

    /* ── Inputs ── */
    textarea, input[type="text"] {
      width: 100%;
      background: #0f0f11;
      border: 1px solid #2e2e38;
      border-radius: 10px;
      color: #e8e8ec;
      font-size: 1rem;
      padding: 0.875rem 1rem;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    textarea { min-height: 140px; line-height: 1.55; resize: vertical; }
    textarea:focus, input[type="text"]:focus { border-color: #7c5cfc; }
    textarea::placeholder, input::placeholder { color: #555566; }

    /* ── Buttons ── */
    button.primary {
      align-self: flex-end;
      background: #7c5cfc;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.4rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button.primary:hover:not(:disabled) { background: #6a48f0; }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

    button.icon-btn {
      background: #7c5cfc;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    button.icon-btn:hover:not(:disabled) { background: #6a48f0; }
    button.icon-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Status ── */
    .status {
      font-size: 0.9rem;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: none;
    }

    .status.success {
      display: block;
      background: #0e2a1a;
      border: 1px solid #1a5c38;
      color: #4ade80;
    }

    .status.error {
      display: block;
      background: #2a0e0e;
      border: 1px solid #5c1a1a;
      color: #f87171;
    }

    .status.info {
      display: block;
      background: #1a1a2e;
      border: 1px solid #2e2e5c;
      color: #a0a0cc;
    }

    /* ── Tags ── */
    .tag {
      display: inline-block;
      background: #2a2a3a;
      border-radius: 4px;
      padding: 0.15rem 0.45rem;
      margin: 0.15rem 0.1rem;
      font-size: 0.8rem;
      color: #c9b8ff;
    }

    .meta { font-size: 0.82rem; color: #888899; margin-top: 0.3rem; }

    /* ── Search row ── */
    .search-row {
      display: flex;
      gap: 0.5rem;
    }

    /* ── Results ── */
    .results { display: flex; flex-direction: column; gap: 0.75rem; }

    .result-card {
      background: #0f0f11;
      border: 1px solid #2e2e38;
      border-radius: 10px;
      padding: 0.875rem 1rem;
    }

    .result-card .label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .result-card.memory .label { color: #7c5cfc; }
    .result-card.household .label { color: #22d3ee; }

    .result-card .content { font-size: 0.93rem; line-height: 1.5; }
    .result-card .sub { font-size: 0.8rem; color: #888899; margin-top: 0.3rem; }

    /* ── Household grid ── */
    .category-group { display: flex; flex-direction: column; gap: 0.5rem; }

    .category-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #22d3ee;
      padding: 0.25rem 0;
      border-bottom: 1px solid #2e2e38;
    }

    .hh-row {
      background: #0f0f11;
      border: 1px solid #2e2e38;
      border-radius: 8px;
      padding: 0.65rem 0.875rem;
      display: flex;
      gap: 0.5rem;
      flex-direction: column;
    }

    .hh-row .item-name { font-weight: 600; font-size: 0.92rem; }
    .hh-row .item-value { font-size: 0.88rem; color: #c9b8ff; }
    .hh-row .item-notes { font-size: 0.8rem; color: #888899; }

    .empty { color: #555566; font-size: 0.9rem; text-align: center; padding: 1.5rem 0; }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555566;
      margin-bottom: 0.25rem;
    }

    /* ── Manage tab ── */
    .sub-tabs {
      display: flex;
      gap: 0.4rem;
      border-bottom: 1px solid #2e2e38;
      padding-bottom: 0.6rem;
    }

    .sub-tab-btn {
      background: none;
      border: none;
      color: #888899;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .sub-tab-btn.active { background: #2a2a3a; color: #c9b8ff; }
    .sub-tab-btn:hover:not(.active) { color: #c9b8ff; }

    button.danger-btn {
      background: #2a0e0e;
      border: 1px solid #5c1a1a;
      color: #f87171;
      border-radius: 6px;
      padding: 0.3rem 0.65rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.danger-btn:hover { background: #3a1010; }

    button.ghost-btn {
      background: #1a1a2e;
      border: 1px solid #2e2e5c;
      color: #a0a0cc;
      border-radius: 6px;
      padding: 0.3rem 0.65rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.ghost-btn:hover { background: #2a2a3e; }
    button.ghost-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .mem-row {
      background: #0f0f11;
      border: 1px solid #2e2e38;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .mem-row .mem-date { font-size: 0.75rem; color: #555566; }
    .mem-row .mem-content { font-size: 0.9rem; line-height: 1.45; }
    .mem-row .mem-actions { display: flex; gap: 0.4rem; margin-top: 0.25rem; }
    .mem-row textarea { min-height: 80px; font-size: 0.9rem; }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      font-size: 0.88rem;
      color: #888899;
    }

    .dup-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .dup-card {
      background: #0f0f11;
      border: 1px solid #5c1a1a;
      border-radius: 8px;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.88rem;
    }

    .dup-sim {
      font-size: 0.75rem;
      color: #f87171;
      font-weight: 700;
      text-align: center;
      padding: 0.15rem 0;
    }

    /* ── File drop zone ── */
    .file-divider {
      border: none;
      border-top: 1px solid #2e2e38;
      margin: 0.1rem 0;
    }

    .drop-zone {
      border: 2px dashed #2e2e38;
      border-radius: 10px;
      padding: 1.1rem 1rem;
      text-align: center;
      color: #555566;
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      position: relative;
      line-height: 1.6;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #7c5cfc;
      background: #1a1a2e;
      color: #c9b8ff;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .file-progress {
      width: 100%;
      height: 4px;
      background: #2e2e38;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .file-progress-bar {
      height: 100%;
      background: #7c5cfc;
      width: 0%;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>🧠 Open Brain</h1>
    </header>

    <!-- Tab bar -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('capture')">Capture</button>
      <button class="tab-btn" onclick="switchTab('search')">Search</button>
      <button class="tab-btn" onclick="switchTab('household')">Household</button>
      <button class="tab-btn" onclick="switchTab('work')">Work</button>
      <button class="tab-btn" onclick="switchTab('manage')">Manage</button>
    </div>

    <!-- Card with panels -->
    <div class="card">

      <!-- ── CAPTURE PANEL ── -->
      <div class="panel active" id="panel-capture">
        <textarea id="thought" placeholder="What's on your mind?" autofocus></textarea>
        <button class="primary" id="capture-btn" onclick="capture()">Capture</button>
        <div class="status" id="capture-status"></div>
        <hr class="file-divider" />
        <div class="drop-zone" id="drop-zone">
          <input type="file" id="file-input" accept=".pdf,.docx,.txt" />
          📎 Drop a file or click to select<br>
          <span style="font-size:0.78rem;color:#444455">PDF · Word · Text · Max 4MB</span>
        </div>
        <div class="file-progress" id="file-progress">
          <div class="file-progress-bar" id="file-progress-bar"></div>
        </div>
        <div class="status" id="file-status"></div>
      </div>

      <!-- ── SEARCH PANEL ── -->
      <div class="panel" id="panel-search">
        <div class="search-row">
          <input type="text" id="search-input" placeholder="Search your brain…" />
          <button class="icon-btn" id="search-btn" onclick="search()">🔍</button>
        </div>
        <div class="status" id="search-status"></div>
        <div class="results" id="search-results"></div>
      </div>

      <!-- ── HOUSEHOLD PANEL ── -->
      <div class="panel" id="panel-household">
        <div class="status" id="hh-status"></div>
        <div id="hh-results"></div>
      </div>

      <!-- ── WORK PANEL ── -->
      <div class="panel" id="panel-work">
        <div class="status" id="work-status"></div>
        <div id="work-results"></div>
      </div>

      <!-- ── MANAGE PANEL ── -->
      <div class="panel" id="panel-manage">
        <div class="sub-tabs">
          <button class="sub-tab-btn active" onclick="switchManage('memories', this)">Memories</button>
          <button class="sub-tab-btn" onclick="switchManage('household', this)">Household</button>
          <button class="sub-tab-btn" onclick="switchManage('work', this)">Work</button>
          <button class="sub-tab-btn" onclick="switchManage('duplicates', this)">Duplicates</button>
        </div>

        <div id="manage-memories">
          <div class="status" id="mem-manage-status"></div>
          <div class="results" id="mem-manage-list"></div>
          <div class="pagination" id="mem-pagination" style="display:none">
            <button class="ghost-btn" id="mem-prev" onclick="loadManageMemories(currentMemPage - 1)">← Prev</button>
            <span id="mem-page-label">Page 1</span>
            <button class="ghost-btn" id="mem-next" onclick="loadManageMemories(currentMemPage + 1)">Next →</button>
          </div>
        </div>

        <div id="manage-household" style="display:none">
          <div class="status" id="hh-manage-status"></div>
          <div class="results" id="hh-manage-list"></div>
        </div>

        <div id="manage-work" style="display:none">
          <div class="status" id="work-manage-status"></div>
          <div class="results" id="work-manage-list"></div>
        </div>

        <div id="manage-duplicates" style="display:none">
          <div class="status" id="dup-status"></div>
          <div id="dup-list"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <script>
    // ── Tab switching ──
    function switchTab(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      event.target.classList.add('active');
      if (name === 'household') loadHousehold();
      if (name === 'work') loadWork();
      if (name === 'manage') { currentMemPage = 0; loadManageMemories(0); }
    }

    // ── CAPTURE ──
    const textarea = document.getElementById('thought');
    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) capture();
    });

    async function capture() {
      const content = textarea.value.trim();
      if (!content) return;

      const btn = document.getElementById('capture-btn');
      const status = document.getElementById('capture-status');

      btn.disabled = true;
      btn.textContent = 'Capturing…';
      status.className = 'status';

      try {
        const res = await fetch('/api/capture', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content, source: 'web' }),
        });

        if (!res.ok) throw new Error((await res.text()) || `HTTP ${res.status}`);

        const data = await res.json();

        if (data.duplicate) {
          status.textContent = '⚡ Already in your brain — skipped duplicate.';
          status.className = 'status info';
        } else {
          const meta = data.metadata || {};
          const topics = (meta.topics || []).map(t => `<span class="tag">${t}</span>`).join('');
          const summary = meta.summary ? `<div class="meta">${meta.summary}</div>` : '';
          status.innerHTML = `✅ Captured${topics ? ' · ' + topics : ''}${summary}`;
          status.className = 'status success';
        }

        textarea.value = '';
        textarea.focus();
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        status.className = 'status error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Capture';
      }
    }

    // ── FILE DROP ──
    (function () {
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');

      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
      dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
      });
      fileInput.addEventListener('change', e => {
        const file = e.target.files[0];
        if (file) handleFile(file);
        fileInput.value = '';
      });
    })();

    // Convert ArrayBuffer to base64 safely (avoids stack overflow on large files)
    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      const chunkSize = 8192;
      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
      }
      return btoa(binary);
    }

    async function handleFile(file) {
      const status = document.getElementById('file-status');
      const progress = document.getElementById('file-progress');
      const bar = document.getElementById('file-progress-bar');

      status.className = 'status info';
      status.textContent = `Processing "${file.name}"…`;
      progress.style.display = 'block';
      bar.style.width = '10%';

      try {
        const ext = file.name.split('.').pop().toLowerCase();
        let payload;

        if (ext === 'txt') {
          const text = await file.text();
          payload = { type: 'text', text, filename: file.name };
          bar.style.width = '30%';

        } else if (ext === 'pdf') {
          if (typeof pdfjsLib === 'undefined') throw new Error('PDF library not loaded. Check your internet connection.');
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          let text = '';
          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            text += content.items.map(item => item.str).join(' ') + '\n\n';
            bar.style.width = `${10 + (i / pdf.numPages) * 30}%`;
          }
          if (!text.trim()) throw new Error('No text found — this may be a scanned PDF. Scanned PDFs are not yet supported.');
          payload = { type: 'pdf', text, filename: file.name };

        } else if (ext === 'docx') {
          const arrayBuffer = await file.arrayBuffer();
          const base64 = arrayBufferToBase64(arrayBuffer);
          payload = { type: 'docx', data: base64, filename: file.name };
          bar.style.width = '30%';

        } else {
          throw new Error('Unsupported file type. Use PDF, DOCX, or TXT.');
        }

        if (file.size > 4 * 1024 * 1024) throw new Error('File exceeds 4MB limit.');

        status.textContent = `Indexing "${file.name}"…`;
        bar.style.width = '55%';

        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        bar.style.width = '90%';

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        const data = await res.json();
        bar.style.width = '100%';
        status.innerHTML = `✅ "${escHtml(file.name)}" indexed — ${data.chunks} chunk${data.chunks !== 1 ? 's' : ''} stored.${data.summary ? `<div class="meta">${escHtml(data.summary)}</div>` : ''}`;
        status.className = 'status success';

      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        status.className = 'status error';
      } finally {
        setTimeout(() => { progress.style.display = 'none'; bar.style.width = '0%'; }, 1500);
      }
    }

    // ── SEARCH ──
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

    async function search() {
      const query = searchInput.value.trim();
      if (!query) return;

      const btn = document.getElementById('search-btn');
      const status = document.getElementById('search-status');
      const results = document.getElementById('search-results');

      btn.disabled = true;
      btn.textContent = '…';
      status.className = 'status info';
      status.textContent = 'Searching…';
      results.innerHTML = '';

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });

        if (!res.ok) throw new Error((await res.text()) || `HTTP ${res.status}`);

        const data = await res.json();
        status.className = 'status';

        const memories = data.memories || [];
        const household = data.household || [];
        const work = data.work || [];

        if (memories.length === 0 && household.length === 0 && work.length === 0) {
          results.innerHTML = '<div class="empty">Nothing found for "' + escHtml(query) + '"</div>';
          return;
        }

        let html = '';

        if (household.length > 0) {
          html += `<div class="section-label">Household</div>`;
          household.forEach(h => {
            html += `
              <div class="result-card household">
                <div class="label">${escHtml(h.category || 'Household')}</div>
                <div class="content"><strong>${escHtml(h.item || '')}</strong>${h.key ? ' · ' + escHtml(h.key) : ''}</div>
                <div class="sub">${escHtml(h.value || '')}${h.notes ? ' — ' + escHtml(h.notes) : ''}</div>
              </div>`;
          });
        }

        if (work.length > 0) {
          html += `<div class="section-label" style="margin-top:0.5rem">Work</div>`;
          work.forEach(w => {
            html += `
              <div class="result-card household" style="border-color:#2e4a2e">
                <div class="label" style="color:#4ade80">${escHtml(w.category || 'Work')}</div>
                <div class="content"><strong>${escHtml(w.item || '')}</strong>${w.key ? ' · ' + escHtml(w.key) : ''}</div>
                <div class="sub">${escHtml(w.value || '')}${w.notes ? ' — ' + escHtml(w.notes) : ''}</div>
              </div>`;
          });
        }

        if (memories.length > 0) {
          html += `<div class="section-label" style="margin-top:0.5rem">Memories</div>`;
          memories.forEach(m => {
            const topics = (m.metadata?.topics || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
            const date = m.created_at ? new Date(m.created_at).toLocaleDateString() : '';
            html += `
              <div class="result-card memory">
                <div class="label">Memory · ${escHtml(date)}</div>
                <div class="content">${escHtml(m.content)}</div>
                ${topics ? `<div class="sub">${topics}</div>` : ''}
              </div>`;
          });
        }

        results.innerHTML = html;
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        status.className = 'status error';
      } finally {
        btn.disabled = false;
        btn.textContent = '🔍';
      }
    }

    // ── WORK LIST ──
    let workLoaded = false;

    async function loadWork() {
      if (workLoaded) return;
      const status = document.getElementById('work-status');
      const results = document.getElementById('work-results');

      status.className = 'status info';
      status.textContent = 'Loading work knowledge…';

      try {
        const res = await fetch('/api/work');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        status.className = 'status';

        if (!data.length) {
          results.innerHTML = '<div class="empty">No work entries yet.<br>Tell your AI to save some work facts!</div>';
          return;
        }

        const grouped = {};
        data.forEach(row => {
          const cat = row.category || 'General';
          if (!grouped[cat]) grouped[cat] = [];
          grouped[cat].push(row);
        });

        let html = '<div style="display:flex;flex-direction:column;gap:1rem;">';
        Object.keys(grouped).sort().forEach(cat => {
          html += `<div class="category-group"><div class="category-title" style="color:#4ade80">${escHtml(cat)}</div>`;
          grouped[cat].forEach(w => {
            html += `
              <div class="hh-row">
                <div class="item-name">${escHtml(w.item || '')}${w.key ? ' <span style="font-weight:400;color:#888899">· ' + escHtml(w.key) + '</span>' : ''}</div>
                <div class="item-value">${escHtml(w.value || '')}</div>
                ${w.notes ? `<div class="item-notes">${escHtml(w.notes)}</div>` : ''}
              </div>`;
          });
          html += '</div>';
        });
        html += '</div>';

        results.innerHTML = html;
        workLoaded = true;
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        status.className = 'status error';
      }
    }

    // ── HOUSEHOLD LIST ──
    let hhLoaded = false;

    async function loadHousehold() {
      if (hhLoaded) return;
      const status = document.getElementById('hh-status');
      const results = document.getElementById('hh-results');

      status.className = 'status info';
      status.textContent = 'Loading household knowledge…';

      try {
        const res = await fetch('/api/household');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        status.className = 'status';

        if (!data.length) {
          results.innerHTML = '<div class="empty">No household entries yet.<br>Tell your AI to save some facts!</div>';
          return;
        }

        // Group by category
        const grouped = {};
        data.forEach(row => {
          const cat = row.category || 'General';
          if (!grouped[cat]) grouped[cat] = [];
          grouped[cat].push(row);
        });

        let html = '<div style="display:flex;flex-direction:column;gap:1rem;">';
        Object.keys(grouped).sort().forEach(cat => {
          html += `<div class="category-group"><div class="category-title">${escHtml(cat)}</div>`;
          grouped[cat].forEach(h => {
            html += `
              <div class="hh-row">
                <div class="item-name">${escHtml(h.item || '')}${h.key ? ' <span style="font-weight:400;color:#888899">· ' + escHtml(h.key) + '</span>' : ''}</div>
                <div class="item-value">${escHtml(h.value || '')}</div>
                ${h.notes ? `<div class="item-notes">${escHtml(h.notes)}</div>` : ''}
              </div>`;
          });
          html += '</div>';
        });
        html += '</div>';

        results.innerHTML = html;
        hhLoaded = true;
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        status.className = 'status error';
      }
    }

    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── MANAGE ──
    let currentMemPage = 0;

    function switchManage(name, btn) {
      ['memories', 'household', 'work', 'duplicates'].forEach(n => {
        document.getElementById('manage-' + n).style.display = n === name ? '' : 'none';
      });
      document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      if (name === 'household') loadManageHousehold();
      if (name === 'work') loadManageWork();
      if (name === 'duplicates') loadDuplicates();
    }

    // ── Memories list ──
    async function loadManageMemories(page) {
      currentMemPage = page;
      const status = document.getElementById('mem-manage-status');
      const list = document.getElementById('mem-manage-list');
      const pag = document.getElementById('mem-pagination');
      status.className = 'status info';
      status.textContent = 'Loading…';
      list.innerHTML = '';

      try {
        const res = await fetch(`/api/manage?resource=memories&page=${page}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        status.className = 'status';

        if (!data.length && page === 0) {
          list.innerHTML = '<div class="empty">No memories yet.</div>';
          pag.style.display = 'none';
          return;
        }

        list.innerHTML = data.map(m => {
          const date = m.created_at ? new Date(m.created_at).toLocaleString() : '';
          const summary = m.metadata?.summary ? ' · ' + escHtml(m.metadata.summary) : '';
          return `<div class="mem-row" id="mem-${m.id}">
            <div class="mem-date">${escHtml(date)}${summary}</div>
            <div class="mem-content">${escHtml(m.content)}</div>
            <div class="mem-actions">
              <button class="ghost-btn" onclick="editMemory('${m.id}')">Edit</button>
              <button class="danger-btn" onclick="deleteItem('memories', '${m.id}', 'mem-${m.id}')">Delete</button>
            </div>
          </div>`;
        }).join('');

        pag.style.display = 'flex';
        document.getElementById('mem-page-label').textContent = `Page ${page + 1}`;
        document.getElementById('mem-prev').disabled = page === 0;
        document.getElementById('mem-next').disabled = data.length < 20;
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        status.className = 'status error';
      }
    }

    function editMemory(id) {
      const row = document.getElementById('mem-' + id);
      const contentDiv = row.querySelector('.mem-content');
      const actionsDiv = row.querySelector('.mem-actions');
      const current = contentDiv.textContent;
      contentDiv.innerHTML = `<textarea id="mem-edit-${id}">${escHtml(current)}</textarea>`;
      actionsDiv.innerHTML = `
        <button class="primary" style="font-size:0.82rem;padding:0.3rem 0.65rem" onclick="saveMemory('${id}')">Save</button>
        <button class="ghost-btn" onclick="loadManageMemories(currentMemPage)">Cancel</button>`;
    }

    async function saveMemory(id) {
      const newContent = document.getElementById('mem-edit-' + id)?.value.trim();
      if (!newContent) return;
      try {
        const res = await fetch('/api/manage', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resource: 'memories', id, content: newContent }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        await loadManageMemories(currentMemPage);
      } catch (err) {
        alert('Save failed: ' + err.message);
      }
    }

    async function deleteItem(resource, id, rowId) {
      if (!confirm('Delete this entry? This cannot be undone.')) return;
      try {
        const res = await fetch('/api/manage', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resource, id }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const el = document.getElementById(rowId);
        if (el) el.remove();
      } catch (err) {
        alert('Delete failed: ' + err.message);
      }
    }

    // ── Household manage ──
    async function loadManageHousehold() {
      const status = document.getElementById('hh-manage-status');
      const list = document.getElementById('hh-manage-list');
      status.className = 'status info';
      status.textContent = 'Loading…';
      list.innerHTML = '';

      try {
        const res = await fetch('/api/manage?resource=household');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        status.className = 'status';

        if (!data.length) {
          list.innerHTML = '<div class="empty">No household entries yet.</div>';
          return;
        }

        list.innerHTML = data.map(h => `
          <div class="mem-row" id="hh-${h.id}">
            <div class="mem-date">${escHtml(h.category || '')} · ${escHtml(h.item || '')}${h.key ? ' · ' + escHtml(h.key) : ''}</div>
            <div class="mem-content">${escHtml(h.value || '')}</div>
            ${h.notes ? `<div class="item-notes">${escHtml(h.notes)}</div>` : ''}
            <div class="mem-actions">
              <button class="ghost-btn" onclick="editHousehold('${h.id}', ${JSON.stringify(h.value||'')}, ${JSON.stringify(h.notes||'')})">Edit</button>
              <button class="danger-btn" onclick="deleteItem('household', '${h.id}', 'hh-${h.id}')">Delete</button>
            </div>
          </div>`).join('');
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        status.className = 'status error';
      }
    }

    function editHousehold(id, value, notes) {
      const row = document.getElementById('hh-' + id);
      const contentDiv = row.querySelector('.mem-content');
      const actionsDiv = row.querySelector('.mem-actions');
      contentDiv.innerHTML = `
        <input type="text" id="hh-val-${id}" value="${escHtml(value)}" placeholder="Value" style="margin-bottom:0.4rem" />
        <input type="text" id="hh-notes-${id}" value="${escHtml(notes)}" placeholder="Notes (optional)" />`;
      actionsDiv.innerHTML = `
        <button class="primary" style="font-size:0.82rem;padding:0.3rem 0.65rem" onclick="saveHousehold('${id}')">Save</button>
        <button class="ghost-btn" onclick="loadManageHousehold()">Cancel</button>`;
    }

    async function saveHousehold(id) {
      const value = document.getElementById('hh-val-' + id)?.value.trim();
      const notes = document.getElementById('hh-notes-' + id)?.value.trim();
      try {
        const res = await fetch('/api/manage', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resource: 'household', id, value, notes }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        await loadManageHousehold();
      } catch (err) {
        alert('Save failed: ' + err.message);
      }
    }

    // ── Work manage ──
    async function loadManageWork() {
      const status = document.getElementById('work-manage-status');
      const list = document.getElementById('work-manage-list');
      status.className = 'status info';
      status.textContent = 'Loading…';
      list.innerHTML = '';

      try {
        const res = await fetch('/api/manage?resource=work');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        status.className = 'status';

        if (!data.length) {
          list.innerHTML = '<div class="empty">No work entries yet.</div>';
          return;
        }

        list.innerHTML = data.map(w => `
          <div class="mem-row" id="wk-${w.id}">
            <div class="mem-date">${escHtml(w.category || '')} · ${escHtml(w.item || '')}${w.key ? ' · ' + escHtml(w.key) : ''}</div>
            <div class="mem-content">${escHtml(w.value || '')}</div>
            ${w.notes ? `<div class="item-notes">${escHtml(w.notes)}</div>` : ''}
            <div class="mem-actions">
              <button class="ghost-btn" onclick="editWork('${w.id}', ${JSON.stringify(w.value||'')}, ${JSON.stringify(w.notes||'')})">Edit</button>
              <button class="danger-btn" onclick="deleteItem('work', '${w.id}', 'wk-${w.id}')">Delete</button>
            </div>
          </div>`).join('');
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        status.className = 'status error';
      }
    }

    function editWork(id, value, notes) {
      const row = document.getElementById('wk-' + id);
      const contentDiv = row.querySelector('.mem-content');
      const actionsDiv = row.querySelector('.mem-actions');
      contentDiv.innerHTML = `
        <input type="text" id="wk-val-${id}" value="${escHtml(value)}" placeholder="Value" style="margin-bottom:0.4rem" />
        <input type="text" id="wk-notes-${id}" value="${escHtml(notes)}" placeholder="Notes (optional)" />`;
      actionsDiv.innerHTML = `
        <button class="primary" style="font-size:0.82rem;padding:0.3rem 0.65rem" onclick="saveWork('${id}')">Save</button>
        <button class="ghost-btn" onclick="loadManageWork()">Cancel</button>`;
    }

    async function saveWork(id) {
      const value = document.getElementById('wk-val-' + id)?.value.trim();
      const notes = document.getElementById('wk-notes-' + id)?.value.trim();
      try {
        const res = await fetch('/api/manage', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resource: 'work', id, value, notes }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        await loadManageWork();
      } catch (err) {
        alert('Save failed: ' + err.message);
      }
    }

    // ── Duplicates ──
    async function loadDuplicates() {
      const status = document.getElementById('dup-status');
      const list = document.getElementById('dup-list');
      status.className = 'status info';
      status.textContent = 'Scanning for duplicates…';
      list.innerHTML = '';

      try {
        const res = await fetch('/api/manage?resource=duplicates');
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }
        const data = await res.json();
        status.className = 'status';

        if (!data.length) {
          list.innerHTML = '<div class="empty">No duplicates found above 85% similarity. ✓</div>';
          return;
        }

        list.innerHTML = data.map(pair => {
          const d1 = pair.created_at1 ? new Date(pair.created_at1).toLocaleDateString() : '';
          const d2 = pair.created_at2 ? new Date(pair.created_at2).toLocaleDateString() : '';
          const sim = Math.round((pair.similarity || 0) * 100);
          return `<div style="margin-bottom:1rem">
            <div class="dup-sim">${sim}% similar</div>
            <div class="dup-pair">
              <div class="dup-card" id="dup-${pair.id1}">
                <div class="mem-date">${escHtml(d1)}</div>
                <div class="mem-content">${escHtml(pair.content1)}</div>
                <button class="danger-btn" style="margin-top:0.4rem" onclick="deleteItem('memories','${pair.id1}','dup-${pair.id1}')">Delete</button>
              </div>
              <div class="dup-card" id="dup-${pair.id2}">
                <div class="mem-date">${escHtml(d2)}</div>
                <div class="mem-content">${escHtml(pair.content2)}</div>
                <button class="danger-btn" style="margin-top:0.4rem" onclick="deleteItem('memories','${pair.id2}','dup-${pair.id2}')">Delete</button>
              </div>
            </div>
          </div>`;
        }).join('');
      } catch (err) {
        status.innerHTML = `Error: ${escHtml(err.message)}<br><small style="opacity:0.7">You may need to run the find_duplicate_memories SQL function in Supabase first.</small>`;
        status.className = 'status error';
      }
    }
  </script>
